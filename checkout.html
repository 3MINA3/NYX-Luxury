<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NYX Luxury</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black py-3">
      <div class="container">
        <!-- Brand Name -->
        <a class="navbar-brand fw-bold" href="index.html"> NYX Luxury </a>

        <!-- Mobile Toggle -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="shop.html">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="cart.html">Cart</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="orders.html">Orders</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="checkout-page py-5">
      <div class="container">
        <h2 class="text-center mb-5 fw-bold text-white">Checkout</h2>

        <form id="checkoutForm" class="bg-dark p-4 rounded">
          <div class="mb-3">
            <label class="form-label text-white">Full Name</label>
            <input type="text" class="form-control" id="fullName" required />
          </div>

          <div class="mb-3">
            <label class="form-label text-white">Email</label>
            <input type="email" class="form-control" id="email" required />
          </div>

          <div class="mb-3">
            <label class="form-label text-white">Address</label>
            <input type="text" class="form-control" id="address" required />
          </div>

          <div class="mb-3">
            <label class="form-label text-white">Phone</label>
            <input type="text" class="form-control" id="phone" required />
          </div>

          <button type="submit" class="btn btn-gold w-100">Place Order</button>
        </form>
      </div>
    </section>

    <footer class="footer">
      <p>
        © 2026 NYX Luxury. All Rights Reserved | Designed by NORMER

        <a href="" target="_blank"> Mina </a>
      </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main JS -->
    <script src="js/main.js"></script>
  </body>
</html>
